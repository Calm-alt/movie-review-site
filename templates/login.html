<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login &mdash; The Watch List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <section class="forest-section">
    <div class="new-review-wrap" style="max-width: 420px; margin: 100px auto;">
      <form class="review-form open" method="POST" action="{{ url_for('login') }}">
        <h2 id="form-heading">Admin Login</h2>

        {% if error %}
          <p style="color: #f66;">{{ error }}</p>
        {% endif %}

        <div class="field">
          <label for="password">Password</label>
          <input type="password"
                 id="password"
                 name="password"
                 required
                 autofocus>
        </div>

        <div class="form-buttons">
          <button type="submit" class="submit-btn">Log in</button>
        </div>
      </form>
    </div>
  </section>

</body>
</html>
